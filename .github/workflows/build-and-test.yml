name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ==================== VENTAS API ====================
      - name: Build and push Ventas API
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/ventas-api:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/ventas-api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/ventas-api:v1.0.${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ==================== DESPACHO API ====================
      - name: Build and push Despacho API
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/despacho-api:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/despacho-api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/despacho-api:v1.0.${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ==================== FRONTEND ====================
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          build-args: |
            VITE_API_URL_VENTAS=https://api.innovatech.com/api/ventas
            VITE_API_URL_DESPACHOS=https://api.innovatech.com/api/despachos
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/frontend:v1.0.${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run backend tests
        run: |
          cd back-Ventas_SpringBoot/Springboot-API-REST
          mvn test -B

      - name: Run Despacho tests
        run: |
          cd back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          mvn test -B

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './front_despacho/package-lock.json'

      - name: Install frontend dependencies
        run: |
          cd front_despacho
          npm ci

      - name: Lint frontend code
        run: |
          cd front_despacho
          npm run lint

      - name: Build frontend
        run: |
          cd front_despacho
          npm run build
