name: CI - Build and Test (Develop)

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  MAVEN_CACHE_DIR: ~/.m2/repository

jobs:
  # ==================== BACKEND - VENTAS ====================
  test-ventas-api:
    name: Test Ventas API
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: 'back-Ventas_SpringBoot/Springboot-API-REST/pom.xml'

      - name: 🔨 Build Ventas API (with tests)
        run: |
          cd back-Ventas_SpringBoot/Springboot-API-REST
          mvn clean verify -B --no-transfer-progress

      - name: 📊 Upload Ventas test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ventas-test-reports
          path: back-Ventas_SpringBoot/Springboot-API-REST/target/surefire-reports
          retention-days: 30

  # ==================== BACKEND - DESPACHOS ====================
  test-despacho-api:
    name: Test Despacho API
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: 'back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/pom.xml'

      - name: 🔨 Build Despacho API (with tests)
        run: |
          cd back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          mvn clean verify -B --no-transfer-progress

      - name: 📊 Upload Despacho test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: despacho-test-reports
          path: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO/target/surefire-reports
          retention-days: 30

  # ==================== FRONTEND ====================
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './front_despacho/package-lock.json'

      - name: 📚 Install dependencies
        run: |
          cd front_despacho
          npm ci --silent

      - name: 🔍 Lint code
        run: |
          cd front_despacho
          npm run lint

      - name: 🏗️ Build frontend
        run: |
          cd front_despacho
          npm run build

      - name: 📊 Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: front_despacho/dist
          retention-days: 7

  # ==================== BUILD DOCKER IMAGES (No Push) ====================
  build-docker-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-ventas-api, test-despacho-api, test-frontend]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Ventas API image
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build Despacho API image
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          push: false
          build-args: |
            VITE_API_URL_VENTAS=http://localhost:8080/api
            VITE_API_URL_DESPACHOS=http://localhost:8081/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==================== STATUS CHECK ====================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [test-ventas-api, test-despacho-api, test-frontend, build-docker-images]
    if: always()
    
    steps:
      - name: ✅ Check CI Status
        run: |
          if [ "${{ needs.test-ventas-api.result }}" != "success" ] || \
             [ "${{ needs.test-despacho-api.result }}" != "success" ] || \
             [ "${{ needs.test-frontend.result }}" != "success" ] || \
             [ "${{ needs.build-docker-images.result }}" != "success" ]; then
            echo "❌ CI FAILED"
            exit 1
          fi
          echo "✅ CI PASSED"
