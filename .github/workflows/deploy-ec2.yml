name: Deploy to AWS EC2

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Select environment'
        options:
          - staging
          - production
        default: staging
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/deploy-ec2.yml'
      - 'docker-compose.yml'

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get EC2 instance IP
        id: instance
        run: |
          INSTANCE_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=innovatech-${{ github.event.inputs.environment || 'production' }}" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "INSTANCE_IP=${INSTANCE_IP}" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        env:
          DOCKER_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        with:
          host: ${{ steps.instance.outputs.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          envs: DOCKER_REGISTRY,AWS_ACCOUNT_ID
          script: |
            # Configure AWS credentials
            aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws configure set region ${{ env.AWS_REGION }}
            
            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin $DOCKER_REGISTRY
            
            # Navigate to app directory
            cd /home/ec2-user/innovatech
            
            # Pull latest images
            docker pull $DOCKER_REGISTRY/innovatech/ventas-api:latest
            docker pull $DOCKER_REGISTRY/innovatech/despacho-api:latest
            docker pull $DOCKER_REGISTRY/innovatech/frontend:latest
            
            # Stop and remove old containers
            docker-compose down || true
            
            # Start new containers
            docker-compose up -d
            
            # Health check
            sleep 10
            curl -f http://localhost/health || exit 1
            
            echo "✅ Deployment successful!"

      - name: Create deployment annotation
        run: |
          echo "## 🚀 Deployment Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Instance IP:** ${{ steps.instance.outputs.INSTANCE_IP }}" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed At:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
