name: Deploy to AWS EC2

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: 'Select environment'
        options:
          - staging
          - production
        default: staging
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/deploy-ec2.yml'
      - 'docker-compose.yml'

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (AWS Academy)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get EC2 instance IP
        id: instance
        run: |
          INSTANCE_IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=innovatech-${{ github.event.inputs.environment || 'production' }}" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "INSTANCE_IP=${INSTANCE_IP}" >> $GITHUB_OUTPUT

      # In AWS Academy, your EC2 instances don't have permanent IAM Roles.
      # We send the temporary runner session credentials via SSH to authorize the remote Docker pull.
      # Note the addition of AWS_SESSION_TOKEN below.
      
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        env:
          DOCKER_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          AWS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
        with:
          host: ${{ steps.instance.outputs.INSTANCE_IP }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: 22
          envs: DOCKER_REGISTRY,AWS_KEY,AWS_SECRET,AWS_TOKEN
          script: |
            # Configure current active AWS Academy session on the EC2 host
            aws configure set aws_access_key_id $AWS_KEY
            aws configure set aws_secret_access_key $AWS_SECRET
            aws configure set aws_session_token $AWS_TOKEN
            aws configure set region us-east-1
            
            # Login remote docker engine to ECR
            aws ecr get-login-password --region us-east-1 | \
              docker login --username AWS --password-stdin $DOCKER_REGISTRY
            
            cd /home/ec2-user/innovatech
            
            docker pull $DOCKER_REGISTRY/innovatech/ventas-api:latest
            docker pull $DOCKER_REGISTRY/innovatech/despacho-api:latest
            docker pull $DOCKER_REGISTRY/innovatech/frontend:latest
            
            docker-compose down || true
            docker-compose up -d
