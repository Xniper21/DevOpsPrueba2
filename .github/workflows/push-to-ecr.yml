name: Build and Push to AWS ECR

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  REGISTRY_ALIAS: innovatech

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build tag
        id: build-tag
        run: |
          VERSION=${{ github.sha }}
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      # ==================== VENTAS API ====================
      - name: Build, tag, and push Ventas API to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./back-Ventas_SpringBoot/Springboot-API-REST
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.REGISTRY_ALIAS }}/ventas-api:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.REGISTRY_ALIAS }}/ventas-api:${{ steps.build-tag.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ==================== DESPACHO API ====================
      - name: Build, tag, and push Despacho API to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.REGISTRY_ALIAS }}/despacho-api:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.REGISTRY_ALIAS }}/despacho-api:${{ steps.build-tag.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ==================== FRONTEND ====================
      - name: Build, tag, and push Frontend to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./front_despacho
          push: true
          build-args: |
            VITE_API_URL_VENTAS=${{ secrets.VITE_API_URL_VENTAS }}
            VITE_API_URL_DESPACHOS=${{ secrets.VITE_API_URL_DESPACHOS }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.REGISTRY_ALIAS }}/frontend:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.REGISTRY_ALIAS }}/frontend:${{ steps.build-tag.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create deployment summary
        run: |
          echo "## ECR Images Pushed 🐳" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.build-tag.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services" >> $GITHUB_STEP_SUMMARY
          echo "- \`ventas-api:${{ steps.build-tag.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`despacho-api:${{ steps.build-tag.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`frontend:${{ steps.build-tag.outputs.VERSION }}\`" >> $GITHUB_STEP_SUMMARY
