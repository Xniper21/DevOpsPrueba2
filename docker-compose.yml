version: "3.9"

services:
  # ==================== DATABASE ====================
  mysql:
    image: mysql:8.0-alpine
    container_name: innovatech-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-innovatechdb}
      MYSQL_USER: ${MYSQL_USER:-innovatech}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-innovatech123}
      MYSQL_INITDB_SKIP_TZINFO: "yes"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - innovatech
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-innovatech}", "-p${MYSQL_PASSWORD:-innovatech123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== VENTAS API ====================
  ventas-api:
    container_name: innovatech-ventas-api
    build:
      context: ./back-Ventas_SpringBoot/Springboot-API-REST
      dockerfile: Dockerfile
    image: ${REGISTRY:-docker.io}/innovatech/ventas-api:${VERSION:-latest}
    restart: unless-stopped
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-innovatechdb}
      DB_USERNAME: ${MYSQL_USER:-innovatech}
      DB_PASSWORD: ${MYSQL_PASSWORD:-innovatech123}
      JAVA_OPTS: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Xms256m -Xmx512m"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - innovatech
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger-ui.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== DESPACHO API ====================
  despacho-api:
    container_name: innovatech-despacho-api
    build:
      context: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
      dockerfile: Dockerfile
    image: ${REGISTRY:-docker.io}/innovatech/despacho-api:${VERSION:-latest}
    restart: unless-stopped
    environment:
      DB_ENDPOINT: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-innovatechdb}
      DB_USERNAME: ${MYSQL_USER:-innovatech}
      DB_PASSWORD: ${MYSQL_PASSWORD:-innovatech123}
      JAVA_OPTS: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Xms256m -Xmx512m"
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - innovatech
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/swagger-ui.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== FRONTEND ====================
  frontend:
    container_name: innovatech-frontend
    build:
      context: ./front_despacho
      dockerfile: Dockerfile
      args:
        VITE_API_URL_VENTAS: ${VITE_API_URL_VENTAS:-http://localhost/api/ventas}
        VITE_API_URL_DESPACHOS: ${VITE_API_URL_DESPACHOS:-http://localhost/api/despachos}
    image: ${REGISTRY:-docker.io}/innovatech/frontend:${VERSION:-latest}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - ventas-api
      - despacho-api
    networks:
      - innovatech
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ==================== NETWORKS ====================
networks:
  innovatech:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ==================== VOLUMES ====================
volumes:
  mysql_data:
    driver: local
